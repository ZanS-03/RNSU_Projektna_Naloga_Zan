<div class="container py-4">
  <h2>WordGame</h2>
  <p class="text-muted">Unscramble the word and type the correct answer.</p>

  <div class="d-flex gap-3 mb-3">
  <span class="badge text-bg-success">Successful: {{ successfulGames }}</span>
  <span class="badge text-bg-warning">Skipped: {{ skippedGames }}</span>
  </div>

  <div class="card p-4">
    <div class="mb-3">
      <div class="small text-muted">Scrambled word</div>
      <div style="font-size: 32px; font-weight: 700;">
        {{ scrambledWord || "Press New Word to start the game!" }}
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Your guess</label>
        <input
          #guessInput
          class="form-control"
          type="text"
          [(ngModel)]="userGuess"
          name="guess"
          placeholder="Type your answer..."
        />
    </div>

    <div class="d-flex gap-2">
      <button type="button" class="btn btn-primary" (click)="confirm()">Confirm</button>
      <button type="button" class="btn btn-outline-secondary" (click)="newWord()">New word</button>
    </div>

    <hr/>

    <div class="alert alert-secondary mb-0">
      Feedback: {{ feedback }}
    </div>

    <div class="small text-muted mt-2">
      original: {{ originalWord }} (za testiranje)
    </div>
  </div>
</div>
