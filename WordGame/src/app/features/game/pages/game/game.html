<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <div>
        <h3 class="mb-1">WordGame</h3>
        <div class="text-muted">Unscramble the word and type the correct answer.</div>
      </div>

      <div class="text-end">
        <div class="small text-muted">Time</div>
        <div class="fs-4 fw-bold">30s</div>
      </div>
    </div>

    <div class="p-3 bg-light rounded mb-3 text-center">
      <div class="display-6 mb-0">?????</div>
      <div class="small text-muted">Scrambled word</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Your guess</label>
      <input class="form-control" type="text" placeholder="Type your answer...">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="button">Confirm</button>
      <button class="btn btn-outline-secondary" type="button">New word</button>
    </div>

    <hr class="my-4">

    <div class="row text-center">
      <div class="col">
        <div class="fw-bold">Score</div>
        <div>0</div>
      </div>
      <div class="col">
        <div class="fw-bold">Games</div>
        <div>0</div>
      </div>
      <div class="col">
        <div class="fw-bold">Correct</div>
        <div>0</div>
      </div>
    </div>

    <div class="mt-3">
      <div class="alert alert-secondary mb-0">
        Feedback: waiting for answer...
      </div>
    </div>
  </div>
</div>
