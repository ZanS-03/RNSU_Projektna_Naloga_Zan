<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Signup</h3>

        <form>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" type="text" placeholder="zan123">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" placeholder="you@example.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" placeholder="••••••">
          </div>

          <button class="btn btn-success w-100" type="button">Create account</button>

          <div class="mt-3 text-center">
            <a routerLink="/login">Already have an account? Login</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
